server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow large Addressables bundle uploads to pass through to the backend.
    client_max_body_size 1024m;

    # API, downloads and health are proxied to the NestJS backend.
    location ~ ^/(api|content|health) {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Stream large uploads instead of buffering them to disk first.
        proxy_request_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # React SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
